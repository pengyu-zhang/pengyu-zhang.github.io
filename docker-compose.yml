services:
  jekyll:
    image: ruby:2.7
    container_name: pengyu_homepage_v2
    working_dir: /srv/jekyll
    environment:
      - BUNDLE_PATH=/usr/local/bundle
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    command: >
      bash -c "gem install bundler -v 2.2.19 --conservative &&
      bundle install &&
      bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling"

volumes:
  bundle_cache:
