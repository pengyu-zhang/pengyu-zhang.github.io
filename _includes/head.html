<meta charset="utf-8">

{% include seo.html %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- Inter is self-hosted (@font-face in _sass/_fonts.scss); preload the latin
     file so the swap from the system-font fallback happens as early as
     possible. Fonts always need crossorigin, even same-origin. -->
<link rel="preload" href="/assets/fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin>

<link rel="stylesheet" href="/assets/css/main.css?v={{ site.time | date: '%s' }}">

<!-- open external links in a new tab by default (in-page nav is handled by JS) -->
<base target="_blank">
