{% assign author = site.author %}

<div itemscope itemtype="http://schema.org/Person" class="profile-card card">

  <img src="/{{ author.avatar }}" class="profile-card__avatar" alt="{{ author.name }}" itemprop="image">

  <h1 class="profile-card__name" itemprop="name">{{ author.name }} <span class="profile-card__name-zh" lang="zh">张鹏宇</span></h1>

  <p class="profile-card__role">Ph.D. Candidate<br>Computer Science<br>{{ author.employer }}</p>

  <p class="profile-card__location"><i class="fas fa-fw fa-map-marker-alt" aria-hidden="true"></i> Amsterdam, the Netherlands</p>

  <a class="profile-card__cta" href="/pdf/CV.pdf">Download CV</a>

  <ul class="profile-card__links">
    <li><a href="mailto:{{ author.email }}"><i class="fas fa-fw fa-envelope" aria-hidden="true"></i> {{ author.email }}</a></li>
    <li><a href="{{ author.googlescholar }}"><i class="fas fa-fw fa-graduation-cap" aria-hidden="true"></i> Google Scholar</a></li>
    <li><a href="https://github.com/{{ author.github }}"><i class="fab fa-fw fa-github" aria-hidden="true"></i> GitHub</a></li>
    <li><a href="https://www.linkedin.com/in/{{ author.linkedin }}"><i class="fab fa-fw fa-linkedin" aria-hidden="true"></i> LinkedIn</a></li>
    <li><a href="https://twitter.com/{{ author.twitter }}"><i class="fab fa-fw fa-twitter-square" aria-hidden="true"></i> Twitter</a></li>
    <li><a href="{{ author.orcid }}"><i class="ai ai-orcid-square ai-fw" aria-hidden="true"></i> ORCID</a></li>
  </ul>

</div>
