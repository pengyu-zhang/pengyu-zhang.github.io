<nav class="tabbar" aria-label="Primary">
  <ul class="tabbar__tabs">
    {% for link in site.data.navigation.main %}
      {% comment %} target="_self" needed: head.html sets <base target="_blank"> {% endcomment %}
      <li><a class="tabbar__tab{% if page.url == link.url %} is-active{% endif %}" href="{{ link.url }}" target="_self"{% if page.url == link.url %} aria-current="page"{% endif %}>{{ link.title }}</a></li>
    {% endfor %}
  </ul>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode"></button>
</nav>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    function setIcon() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = dark ? '☀️' : '🌙'; // ☀️ / 🌙
    }
    setIcon();
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
      setIcon();
    });
  })();
</script>
